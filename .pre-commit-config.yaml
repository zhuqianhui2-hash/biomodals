default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # list of supported hooks: https://pre-commit.com/hooks.html
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: debug-statements
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-yaml
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb", "16384"]

  # python code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.13"
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
        types_or: [python, pyi, jupyter, pyproject]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  # yaml formatting
  # - repo: https://github.com/google/yamlfmt
  #   rev: v0.17.
  #   hooks:
  #     - id: yamlfmt

  # shell scripts linter
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # md formatting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.0
    hooks:
      - id: rumdl # Lint only (fails on issues)
        args: ["-d", "MD013"] # comma-separated ignored rules
      - id: rumdl-fmt # Auto-format and fail if issues remain

  # jupyter notebook cell output clearing
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        args: ["--drop-empty-cells", "--keep-output", "--unix-newline"]
